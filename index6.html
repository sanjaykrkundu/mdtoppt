<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MD Studio Pro - Image & Design Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/theme/black.min.css" id="theme-link">
    
    <style>
        .reveal-viewport { transition: background 0.5s ease; }
        .selected-element { outline: 2px solid #3B82F6 !important; outline-offset: 4px; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        [contenteditable="true"] { outline: none; }
        .sidebar-card { @apply bg-gray-900/50 p-4 rounded-xl border border-gray-700 mb-4; }
        .control-label { @apply text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1 block; }
        /* Image styling within slides */
        .reveal img { max-width: 80%; max-height: 400px; margin: 20px auto; display: block; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden">

    <header class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center z-20">
        <h1 class="text-xl font-bold text-blue-500">MD Studio <span class="text-white font-light">Pro</span></h1>
        <div class="flex gap-2">
            <input type="file" id="fileInput" class="hidden" accept=".md">
            <button onclick="document.getElementById('fileInput').click()" class="text-xs bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded">Upload .md</button>
            <button onclick="syncAndRender()" class="text-xs bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold">Sync & Render</button>
            <button onclick="toggleFullscreen()" class="text-xs bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded font-bold">⛶ Full Screen</button>
            <button onclick="exportStaticHTML()" class="text-xs bg-green-600 hover:bg-green-500 px-4 py-2 rounded font-bold">Export HTML</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-80 bg-gray-800 border-r border-gray-700 p-4 flex flex-col overflow-y-auto shadow-2xl">
            
            <div class="sidebar-card">
                <label class="control-label">Quick Theme</label>
                <select id="themeSelect" onchange="changeTheme(this.value)" class="w-full bg-gray-800 border border-gray-600 p-2 rounded text-sm text-blue-400">
                    <option value="black">Black</option>
                    <option value="white">White</option>
                    <option value="league">League</option>
                    <option value="dracula">Dracula</option>
                </select>
            </div>

            <div class="sidebar-card">
                <label class="control-label">Media & Assets</label>
                <input type="file" id="imageInput" class="hidden" accept="image/*">
                <button onclick="document.getElementById('imageInput').click()" class="w-full bg-gray-700 hover:bg-gray-600 p-2 rounded text-xs font-bold transition flex items-center justify-center gap-2">
                    <span>🖼️</span> Insert Image to Slide
                </button>
                <p class="text-[9px] text-gray-500 mt-2 italic text-center">Images will be embedded in your final HTML</p>
            </div>

            <div class="sidebar-card">
                <div id="selectionStatus" class="text-[10px] font-bold text-blue-400 uppercase mb-4 border-b border-blue-900/50 pb-1">Editing: Slide Background</div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="control-label">Background</label>
                        <input type="color" id="bgColor" oninput="applyStyle('backgroundColor', this.value)" class="w-full h-10 rounded bg-gray-800 cursor-pointer">
                    </div>
                    <div>
                        <label class="control-label">Text Color</label>
                        <input type="color" id="textColor" oninput="applyStyle('color', this.value)" class="w-full h-10 rounded bg-gray-800 cursor-pointer">
                    </div>
                </div>
                <div>
                    <label class="control-label">Font Size</label>
                    <input type="number" id="fontSize" oninput="applyStyle('fontSize', this.value + 'px')" class="w-full bg-gray-800 border border-gray-700 p-2 rounded text-sm">
                </div>
            </div>

            <div class="sidebar-card flex-1">
                <label class="control-label">Markdown Input</label>
                <textarea id="mdInput" class="w-full h-full p-2 bg-gray-950 rounded text-xs font-mono border border-gray-700 outline-none"># Sales Presentation
---
## Revenue Chart
(Click 'Insert Image' to add a chart here)
---
## Q2 Forecast
* 15% Growth expected</textarea>
            </div>
        </aside>

        <section id="presentation-zone" class="flex-1 bg-black relative" onclick="deselect()">
            <div class="reveal">
                <div class="slides" id="slideContainer"></div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/plugin/markdown/markdown.min.js"></script>

    <script>
        let deck = null;
        let selectedElement = null;

        function syncAndRender() {
            const content = document.getElementById('mdInput').value;
            const container = document.getElementById('slideContainer');
            container.innerHTML = `<section data-markdown><textarea data-template>${content}</textarea></section>`;
            if (deck) deck.destroy();
            deck = new Reveal(document.querySelector('.reveal'), { embedded: true, center: true, plugins: [ RevealMarkdown ] });
            deck.initialize().then(() => attachEditableListeners());
        }

        // --- NEW IMAGE HANDLER ---
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const currentSlide = deck.getCurrentSlide();
                const img = document.createElement('img');
                img.src = event.target.result; // Base64 Data
                img.onclick = (e) => { e.stopPropagation(); selectElement(img); };
                currentSlide.appendChild(img);
            };
            reader.readAsDataURL(file);
        });

        function attachEditableListeners() {
            document.querySelectorAll('.reveal .slides section *').forEach(el => {
                if(el.tagName === 'SECTION') return;
                if(el.tagName !== 'IMG') el.setAttribute('contenteditable', 'true');
                el.addEventListener('click', (e) => { e.stopPropagation(); selectElement(el); });
            });
        }

        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('selected-element');
            selectedElement = el;
            selectedElement.classList.add('selected-element');
            document.getElementById('selectionStatus').innerText = "Editing: Selected " + el.tagName;
            const style = window.getComputedStyle(el);
            document.getElementById('textColor').value = rgbToHex(style.color);
            document.getElementById('bgColor').value = rgbToHex(style.backgroundColor);
        }

        function deselect() {
            if (selectedElement) selectedElement.classList.remove('selected-element');
            selectedElement = null;
            document.getElementById('selectionStatus').innerText = "Editing: Slide Background";
        }

        function applyStyle(prop, val) {
            if (selectedElement) selectedElement.style[prop] = val;
            else if (deck.getCurrentSlide()) deck.getCurrentSlide().style[prop] = val;
        }

        function rgbToHex(rgb) {
            if (!rgb || rgb.includes('rgba(0, 0, 0, 0)') || rgb === 'transparent') return "#000000";
            const parts = rgb.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            return parts ? "#" + parts.slice(1).map(x => parseInt(x).toString(16).padStart(2, '0')).join('') : "#000000";
        }

        function changeTheme(themeName) {
            document.getElementById('theme-link').href = `https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/theme/${themeName}.min.css`;
            setTimeout(() => { if(deck) deck.layout(); }, 200);
        }

        function toggleFullscreen() {
            const zone = document.getElementById('presentation-zone');
            if (!document.fullscreenElement) zone.requestFullscreen().then(() => deck.layout());
            else document.exitFullscreen();
        }

        function exportStaticHTML() {
            const slidesHTML = document.querySelector('.slides').innerHTML;
            const themeUrl = document.getElementById('theme-link').href;
            const finalHTML = `<!DOCTYPE html><html><head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css"><link rel="stylesheet" href="${themeUrl}"></head><body><div class="reveal"><div class="slides">${slidesHTML}</div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.js"><\/script><script>Reveal.initialize({ center: true });<\/script></body></html>`;
            const blob = new Blob([finalHTML], { type: 'text/html' });
            const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'presentation.html' });
            a.click();
        }

        window.onload = syncAndRender;
    </script>
</body>
</html>
